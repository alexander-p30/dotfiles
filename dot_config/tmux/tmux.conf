# Set 24-bit colors
set-option -sa terminal-overrides ",xterm*:Tc"

# Set prefix
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Status bar styling
set -g status-style "bg=#1a1a1a"
set -g status-left " #[fg=green,bold]#S "
set -g status-right "#{uptime} | %a %h-%d %H:%M "
set -g window-status-format "#[fg=white,bg=default] #I:#W "
set -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W "

# Set vi mode
set-window-option -g mode-keys vi
# Copy mode keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-left-length 20
set -g set-clipboard off
set -g allow-passthrough on
set -ga update-environment "OUTER_TERM_PROGRAM"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind-key -n -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Open panes/windows in CWD
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"

bind-key l next-window
bind-key h previous-window
bind-key c kill-pane
bind-key C kill-window

# Install plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'robhurring/tmux-uptime'
set -g @plugin 'thuanOwa/tmux-fzf-session-switch'

# Configure tmux-fzf-session-switch
set -g @fzf-goto-session '"'
set -g @fzf-goto-win-width 50
set -g @fzf-goto-win-height 20

run '~/.tmux/plugins/tpm/tpm'
